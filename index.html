<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .day-cell { position: relative; transition: all 0.2s ease; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 700; border-radius: 14px; font-size: 0.875rem; cursor: pointer; }
    .date-disabled { background-color: #f1f5f9; color: #cbd5e1; cursor: not-allowed; opacity: 0.6; }
    .date-full { background-color: #fee2e2; color: #ef4444; border: 2px solid #fecaca; cursor: not-allowed; }
    .date-warning { background-color: #fef9c3; color: #a16207; border: 2px solid #fef08a; }
    .date-free { background-color: #f0fdf4; color: #166534; border: 2px solid #dcfce7; }
    .date-selected { background-color: #4f46e5 !important; color: white !important; }
    .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 18px; height: 18px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4 md:p-10">

  <div class="max-w-7xl mx-auto space-y-8">
    <header class="flex justify-between items-center bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
      <div class="flex items-center gap-4">
        <div class="bg-indigo-600 p-3 rounded-2xl text-white">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 10h18"/><rect width="18" height="18" x="3" y="4" rx="2"/></svg>
        </div>
        <div>
          <h1 class="text-xl font-extrabold text-slate-900">TimeOff Portal</h1>
          <p id="userRole" class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mt-1">...</p>
        </div>
      </div>
      <div class="flex items-center gap-4 bg-slate-50 pl-2 pr-5 py-2 rounded-2xl border border-slate-100">
        <div id="userInitials" class="w-9 h-9 rounded-xl bg-white text-indigo-600 flex items-center justify-center font-black">?</div>
        <p id="userName" class="text-sm font-bold text-slate-700">Loading...</p>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <div class="lg:col-span-8 bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-10">
          <h2 id="monthLabel" class="text-2xl font-black text-slate-800">Month Year</h2>
          <div class="flex gap-2">
            <button id="prevBtn" class="p-2 border rounded-xl hover:bg-slate-50">←</button>
            <button id="nextBtn" class="p-2 border rounded-xl hover:bg-slate-50">→</button>
          </div>
        </div>
        <div class="grid grid-cols-7 gap-4 mb-6 text-center text-[10px] font-black text-slate-300 uppercase tracking-widest">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="cal-grid" class="grid grid-cols-7 gap-4"></div>
      </div>

      <div class="lg:col-span-4 space-y-8">
        <div class="bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
          <p class="text-[10px] font-black opacity-70 mb-2 uppercase">My Balance</p>
          <h3 id="creditRem" class="text-5xl font-black mb-4">-</h3>
          <div class="text-[10px] font-bold opacity-80 border-t border-indigo-400 pt-3 flex justify-between">
            <span>ACCRUED: <span id="creditTot">-</span></span>
            <span>USED: <span id="creditUse">-</span></span>
          </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
          <p id="rangeDisplay" class="text-sm font-bold text-indigo-600 italic mb-4 text-center">Select dates on calendar</p>
          <textarea id="reason" placeholder="Reason for leave..." class="w-full p-4 rounded-xl bg-slate-50 border-none text-sm mb-4" rows="2"></textarea>
          <div id="uiMsg" class="hidden text-[10px] font-bold p-3 rounded-xl mb-4 text-center"></div>
          <button id="submitBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl flex items-center justify-center gap-3">
            <span id="btnText">SUBMIT REQUEST</span><div id="btnSpinner" class="spinner hidden"></div>
          </button>
        </div>
      </div>

    </div>

    <div id="managerSection" class="hidden grid-cols-1 md:grid-cols-2 gap-8 border-t-2 border-slate-100 pt-8">
      
      <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
        <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest mb-6">Team Oversight</h3>
        <div id="teamCreditList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
           <p class="text-xs text-slate-400 italic">Loading team data...</p>
        </div>
      </div>

      <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest">Action Required</h3>
          <span class="bg-red-50 text-red-600 text-[9px] font-black px-2 py-1 rounded uppercase">Pending</span>
        </div>
        <div id="pendingActions" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
           <p class="text-xs text-slate-400 italic">Loading pending requests...</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    let user = {}, calendarData = {}, selectedStart = null, selectedEnd = null, currentMonth = new Date(), myRemaining = 0;

    function init() {
      google.script.run.withSuccessHandler(res => {
        user = res;
        document.getElementById('userName').innerText = res.name;
        document.getElementById('userRole').innerText = `${res.role} • ${res.team}`;
        document.getElementById('userInitials').innerText = res.name.charAt(0).toUpperCase();
        
        // Show Manager bottom suite if applicable
        if (user.role.includes('manager')) {
          document.getElementById('managerSection').classList.remove('hidden');
          document.getElementById('managerSection').classList.add('grid');
        }
        refreshData();
      }).initUserSession();
    }

    function refreshData() {
      google.script.run.withSuccessHandler(data => { calendarData = data; renderCalendar(); }).getCalendarDetails();
      
      google.script.run.withSuccessHandler(c => {
        myRemaining = parseFloat(c.remaining);
        document.getElementById('creditRem').innerText = c.remaining;
        document.getElementById('creditTot').innerText = c.total;
        document.getElementById('creditUse').innerText = c.used;
      }).getLeaveCredits(user);

      if (user.role.includes('manager')) {
        google.script.run.withSuccessHandler(team => {
          const creditList = document.getElementById('teamCreditList');
          const pendingList = document.getElementById('pendingActions');
          creditList.innerHTML = ''; pendingList.innerHTML = '';
          
          let hasPending = false;
          
          team.forEach(m => {
            // Build Oversight Card showing explicit Leave Days
            creditList.innerHTML += `
              <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                  <span class="font-bold text-slate-800 text-sm">${m.name} <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">(${m.team})</span></span>
                  <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-black">${m.remaining} Bal</span>
                </div>
                <div class="text-[10px] text-slate-500 mt-2 font-semibold border-t border-slate-200 pt-2">
                  <span class="text-slate-400 uppercase">Approved Leaves:</span> ${m.history.join(', ')}
                </div>
              </div>`;

            // Build Pending Approvals
            if (m.pending.length > 0) {
              hasPending = true;
              m.pending.forEach(p => {
                pendingList.innerHTML += `
                  <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                      <span class="text-xs font-black text-amber-900">${p.name}</span>
                      <span class="text-[9px] font-black text-red-500 uppercase italic">Needs Credit Check</span>
                    </div>
                    <p class="text-[11px] text-amber-700 font-bold mb-4">Requested: ${p.range}</p>
                    <div class="flex gap-2">
                      <button onclick="handleAction(${p.row}, 'APPROVED')" class="flex-1 bg-amber-500 text-white text-[10px] font-black py-2 rounded-lg shadow-sm hover:bg-amber-600 transition-colors">APPROVE</button>
                      <button onclick="handleAction(${p.row}, 'DECLINED')" class="flex-1 bg-white text-slate-500 border border-slate-300 text-[10px] font-black py-2 rounded-lg hover:bg-slate-50 transition-colors">DECLINE</button>
                    </div>
                  </div>`;
              });
            }
          });

          if (!hasPending) pendingList.innerHTML = '<div class="p-6 text-center text-slate-400 text-xs font-bold bg-slate-50 rounded-xl border border-slate-100">✅ All caught up! No pending requests.</div>';
        }).getManagerDashboardData(user);
      }
    }

    function handleAction(row, status) {
      google.script.run.withSuccessHandler(() => refreshData()).updateLeaveStatus(row, status);
    }

    function renderCalendar() {
      const grid = document.getElementById('cal-grid');
      const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
      document.getElementById('monthLabel').innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentMonth);
      grid.innerHTML = '';
      const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date(); today.setHours(0,0,0,0);
      const minDate = new Date(today); minDate.setDate(minDate.getDate() + 30);

      for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        let date = new Date(year, month, d), dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let count = calendarData.countMap[dateStr] || 0;
        let stateClass = date < minDate ? "date-disabled" : (count >= 2 ? "date-full" : (count === 1 ? "date-warning" : "date-free"));
        if (selectedStart && selectedEnd) {
          let s = new Date(selectedStart + "T00:00:00"), e = new Date(selectedEnd + "T00:00:00");
          if (date >= s && date <= e) stateClass += " date-selected";
        } else if (selectedStart === dateStr) stateClass += " date-selected";

        const div = document.createElement('div');
        div.className = `day-cell ${stateClass}`; div.innerText = d;
        if (!stateClass.includes('disabled') && !stateClass.includes('full')) div.onclick = () => handleDateClick(dateStr);
        grid.appendChild(div);
      }
    }

    function handleDateClick(dateStr) {
      if (!selectedStart || (selectedStart && selectedEnd)) { selectedStart = dateStr; selectedEnd = null; }
      else {
        let start = new Date(selectedStart), end = new Date(dateStr);
        if (end < start) { selectedEnd = selectedStart; selectedStart = dateStr; } else selectedEnd = dateStr;
      }
      document.getElementById('rangeDisplay').innerText = selectedEnd ? `${selectedStart} to ${selectedEnd}` : `Start: ${selectedStart}`;
      renderCalendar();
    }

    function submitForm() {
      if (!selectedStart || !selectedEnd) return;
      const btn = document.getElementById('submitBtn'), spin = document.getElementById('btnSpinner'), txt = document.getElementById('btnText');
      let s = new Date(selectedStart + "T00:00:00"), e = new Date(selectedEnd + "T00:00:00");
      let daysRequested = Math.round((e - s) / 86400000) + 1;
      let finalStatus = (daysRequested <= myRemaining) ? "APPROVED" : "PENDING";
      
      btn.disabled = true; spin.classList.remove('hidden'); txt.innerText = "PROCESSING";
      google.script.run.withSuccessHandler(res => {
        showMsg(res.msg, res.ok ? 'success' : 'err'); refreshData();
        selectedStart = null; selectedEnd = null; document.getElementById('reason').value = "";
        document.getElementById('rangeDisplay').innerText = "Select dates on calendar";
        btn.disabled = false; spin.classList.add('hidden'); txt.innerText = "SUBMIT REQUEST";
      }).submitLeave({ email: user.email, name: user.name, team: user.team, start: selectedStart, end: selectedEnd, reason: document.getElementById('reason').value, status: finalStatus });
    }

    function showMsg(t, type) {
      const el = document.getElementById('uiMsg');
      el.className = `text-[11px] font-bold p-3 rounded-xl block ${type === 'err' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
      el.innerText = t;
    }

    document.getElementById('prevBtn').onclick = () => { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); };
    document.getElementById('nextBtn').onclick = () => { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); };
    document.getElementById('submitBtn').onclick = submitForm;
    window.onload = init;
  </script>
</body>
</html>
